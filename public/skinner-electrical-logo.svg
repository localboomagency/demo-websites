  <defs>
    <style>
      .brand-main { font-family: Impact, Haettenschweiler, "Arial Black", Arial, Helvetica, sans-serif; }
      .brand-sub { font-family: Georgia, "Times New Roman", serif; }
    </style>
  </defs>

  <rect width="1000" height="520" fill="#111111"/>

  <g transform="translate(386 54)">
