  <text x="600" y="772" font-size="30" fill="#1A2820" font-weight="600" text-anchor="middle">Therapy for </text>
  <text x="730" y="772" font-size="30" fill="#1A2820" font-style="italic" text-anchor="middle">Every Need</text>

  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0D4C8"/>
      <stop offset="55%" stop-color="#5A7A68"/>
      <stop offset="100%" stop-color="#1C3828"/>
