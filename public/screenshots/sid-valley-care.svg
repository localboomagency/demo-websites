<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F7F4EF"/>

  <!-- Nav -->
  <rect width="1200" height="68" fill="#fff"/>
  <rect width="1200" height="1" y="67" fill="#E0D9D0"/>
  <!-- Logo dot -->
  <circle cx="40" cy="34" r="16" fill="#2D7A6C"/>
  <text x="66" y="40" font-size="18" font-weight="600" fill="#1C3A5E" font-family="Georgia, serif">Sid Valley Care</text>
  <!-- Nav links -->
  <text x="280" y="40" font-size="13" fill="#4B5563" font-family="Arial, sans-serif">Services</text>
  <text x="360" y="40" font-size="13" fill="#4B5563" font-family="Arial, sans-serif">Reviews</text>
  <text x="440" y="40" font-size="13" fill="#4B5563" font-family="Arial, sans-serif">About Us</text>
  <text x="524" y="40" font-size="13" fill="#4B5563" font-family="Arial, sans-serif">Contact</text>
  <!-- Phone button -->
  <rect x="1020" y="18" width="160" height="34" rx="6" fill="#2D7A6C"/>
  <text x="1100" y="40" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">01395 123456</text>

  <!-- Hero -->
  <rect y="68" width="1200" height="360" fill="url(#heroGrad)"/>
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1C3A5E"/>
      <stop offset="100%" stop-color="#2D7A6C"/>
    </linearGradient>
  </defs>

  <!-- Hero H1 -->
  <text x="80" y="155" font-size="38" font-weight="700" fill="#fff" font-family="Georgia, serif">Flexible Homecare Services</text>
  <text x="80" y="203" font-size="38" font-weight="700" fill="#fff" font-family="Georgia, serif">in Sidmouth</text>

  <!-- Subheading -->
  <text x="80" y="238" font-size="15" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">Compassionate, professional care delivered in the comfort of your own home.</text>

  <!-- Google review widget -->
  <rect x="80" y="256" width="320" height="38" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="100" y="281" font-size="14" fill="#FBBC05" font-family="Arial, sans-serif">★★★★★</text>
  <text x="195" y="281" font-size="13" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">4.9 · 187 reviews on Google</text>

  <!-- Bullets -->
  <text x="96" y="322" font-size="13" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">✓  CQC-regulated provider, rated Good</text>
  <text x="96" y="344" font-size="13" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">✓  All carers fully DBS checked and trained</text>
  <text x="96" y="366" font-size="13" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">✓  Flexible visits from 30 minutes to live-in care</text>
  <text x="96" y="388" font-size="13" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif">✓  24/7 on-call support for families and clients</text>

  <!-- CTAs -->
  <rect x="80" y="400" width="200" height="42" rx="8" fill="#E8A84C"/>
  <text x="180" y="426" font-size="14" font-weight="700" fill="#1C3A5E" text-anchor="middle" font-family="Arial, sans-serif">Call: 01395 123456</text>
  <rect x="296" y="400" width="220" height="42" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="406" y="426" font-size="14" font-weight="600" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif">Request Free Assessment</text>

  <!-- Trust bar -->
  <rect y="428" width="1200" height="68" fill="#fff" stroke="#E0D9D0" stroke-width="1"/>
  <text x="120" y="468" font-size="20" font-weight="800" fill="#1C3A5E" text-anchor="middle" font-family="Arial, sans-serif">2011</text>
  <text x="120" y="484" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial, sans-serif">Est.</text>
  <text x="360" y="468" font-size="20" font-weight="800" fill="#1C3A5E" text-anchor="middle" font-family="Arial, sans-serif">1,200+</text>
  <text x="360" y="484" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial, sans-serif">Clients Supported</text>
  <text x="600" y="468" font-size="20" font-weight="800" fill="#1C3A5E" text-anchor="middle" font-family="Arial, sans-serif">4.9 / 5</text>
  <text x="600" y="484" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial, sans-serif">Google Rating</text>
  <text x="840" y="468" font-size="20" font-weight="800" fill="#1C3A5E" text-anchor="middle" font-family="Arial, sans-serif">Good</text>
  <text x="840" y="484" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial, sans-serif">CQC Rating</text>
  <text x="1080" y="468" font-size="20" font-weight="800" fill="#1C3A5E" text-anchor="middle" font-family="Arial, sans-serif">85,000+</text>
  <text x="1080" y="484" font-size="10" fill="#6B7280" text-anchor="middle" font-family="Arial, sans-serif">Care Hours</text>

  <!-- Services section label -->
  <text x="80" y="540" font-size="11" font-weight="700" fill="#2D7A6C" font-family="Arial, sans-serif">OUR SERVICES</text>
  <text x="80" y="570" font-size="24" font-weight="700" fill="#1C3A5E" font-family="Georgia, serif">Tailored care, delivered your way</text>

  <!-- Service cards row -->
  <rect x="80" y="592" width="320" height="90" rx="12" fill="#fff" stroke="#E0D9D0" stroke-width="1"/>
  <rect x="84" y="596" width="40" height="40" rx="10" fill="#EEF8F6"/>
  <text x="104" y="622" font-size="13" fill="#1C3A5E" text-anchor="middle" font-family="Arial, sans-serif">+</text>
  <text x="136" y="622" font-size="14" font-weight="600" fill="#1C3A5E" font-family="Georgia, serif">Personal Care</text>
  <text x="136" y="638" font-size="11" fill="#6B7280" font-family="Arial, sans-serif">Bathing, dressing and grooming support.</text>

  <rect x="420" y="592" width="320" height="90" rx="12" fill="#fff" stroke="#E0D9D0" stroke-width="1"/>
  <text x="476" y="622" font-size="14" font-weight="600" fill="#1C3A5E" font-family="Georgia, serif">Medication Support</text>
  <text x="476" y="638" font-size="11" fill="#6B7280" font-family="Arial, sans-serif">Timely reminders and administration.</text>

  <rect x="760" y="592" width="360" height="90" rx="12" fill="#fff" stroke="#E0D9D0" stroke-width="1"/>
  <text x="816" y="622" font-size="14" font-weight="600" fill="#1C3A5E" font-family="Georgia, serif">Dementia Care</text>
  <text x="816" y="638" font-size="11" fill="#6B7280" font-family="Arial, sans-serif">Specialist support from trained carers.</text>

  <!-- Reviews band preview -->
  <rect y="710" width="1200" height="90" fill="#1C3A5E"/>
  <text x="80" y="748" font-size="11" font-weight="700" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif">CLIENT TESTIMONIALS</text>
  <text x="80" y="772" font-size="20" font-weight="700" fill="#fff" font-family="Georgia, serif">Trusted by families across the Sid Valley</text>
</svg>
