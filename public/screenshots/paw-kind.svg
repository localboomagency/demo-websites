<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#FAF5EE"/>
  <!-- Nav bar -->
  <rect width="800" height="56" fill="#FAF5EE" stroke="#E8D9C8" stroke-width="1"/>
  <!-- Logo paw -->
  <g fill="#C0563A" transform="translate(32,16)">
    <ellipse cx="12" cy="16" rx="5" ry="4"/>
    <ellipse cx="6" cy="10.5" rx="2.2" ry="2.8" transform="rotate(-18 6 10.5)"/>
    <ellipse cx="10" cy="8" rx="2.2" ry="2.8" transform="rotate(-5 10 8)"/>
    <ellipse cx="14" cy="8" rx="2.2" ry="2.8" transform="rotate(5 14 8)"/>
    <ellipse cx="18" cy="10.5" rx="2.2" ry="2.8" transform="rotate(18 18 10.5)"/>
  </g>
  <text x="60" y="32" font-family="sans-serif" font-weight="900" font-size="16" fill="#2C1A0E">Paw Kind</text>
  <!-- Nav links -->
  <text x="200" y="32" font-family="sans-serif" font-size="11" fill="#6B4C3B">Services</text>
  <text x="270" y="32" font-family="sans-serif" font-size="11" fill="#6B4C3B">Reviews</text>
  <text x="340" y="32" font-family="sans-serif" font-size="11" fill="#6B4C3B">About</text>
  <text x="400" y="32" font-family="sans-serif" font-size="11" fill="#6B4C3B">Contact</text>
  <rect x="650" y="14" width="120" height="28" rx="6" fill="#C0563A"/>
  <text x="710" y="32" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">01626 834 120</text>

  <!-- Hero -->
  <rect y="56" width="800" height="220" fill="url(#heroGrad)"/>
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF5EE"/>
      <stop offset="100%" stop-color="#EDD9C4"/>
    </linearGradient>
  </defs>
  <!-- Decorative paw prints -->
  <g fill="#C89A2E" opacity="0.12" transform="translate(640,60) rotate(22) scale(1.6)">
    <ellipse cx="12" cy="16" rx="5" ry="4"/><ellipse cx="6" cy="10.5" rx="2.2" ry="2.8" transform="rotate(-18 6 10.5)"/><ellipse cx="10" cy="8" rx="2.2" ry="2.8"/><ellipse cx="14" cy="8" rx="2.2" ry="2.8"/><ellipse cx="18" cy="10.5" rx="2.2" ry="2.8" transform="rotate(18 18 10.5)"/>
  </g>
  <g fill="#C89A2E" opacity="0.1" transform="translate(50,220) rotate(-28) scale(2)">
    <ellipse cx="12" cy="16" rx="5" ry="4"/><ellipse cx="6" cy="10.5" rx="2.2" ry="2.8" transform="rotate(-18 6 10.5)"/><ellipse cx="10" cy="8" rx="2.2" ry="2.8"/><ellipse cx="14" cy="8" rx="2.2" ry="2.8"/><ellipse cx="18" cy="10.5" rx="2.2" ry="2.8" transform="rotate(18 18 10.5)"/>
  </g>
