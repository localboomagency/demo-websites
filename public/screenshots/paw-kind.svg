  <text x="400" y="148" font-family="sans-serif" font-weight="900" font-size="28" fill="#2C1A0E" text-anchor="middle">Dog Walking &amp; Daycare</text>
  <text x="400" y="180" font-family="sans-serif" font-weight="900" font-size="28" fill="#2C1A0E" text-anchor="middle">in <tspan fill="#C0563A">Bovey Tracey</tspan></text>
  <!-- Subheading -->
  <text x="400" y="208" font-family="sans-serif" font-size="12" fill="#6B4C3B" text-anchor="middle">Trusted, tail-wagging care across Bovey Tracey and the Dartmoor fringe.</text>
  <!-- CTAs -->
  <rect x="240" y="228" width="140" height="32" rx="7" fill="#C0563A"/>
  <text x="310" y="249" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">01626 834 120</text>
  <rect x="392" y="228" width="140" height="32" rx="7" fill="#fff" stroke="#C0563A" stroke-width="2"/>
  <text x="462" y="249" font-family="sans-serif" font-size="11" font-weight="700" fill="#C0563A" text-anchor="middle">Get a Free Quote</text>

  <!-- Trust bar -->
  <rect y="276" width="800" height="56" fill="#2C1A0E"/>
  <text x="100" y="296" font-family="sans-serif" font-weight="900" font-size="14" fill="#C89A2E" text-anchor="middle">Est. 2018</text>
  <text x="100" y="314" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">SERVING BOVEY TRACEY</text>
  <text x="300" y="296" font-family="sans-serif" font-weight="900" font-size="14" fill="#C89A2E" text-anchor="middle">800+</text>
  <text x="300" y="314" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">DOGS WALKED</text>
  <text x="500" y="296" font-family="sans-serif" font-weight="900" font-size="14" fill="#C89A2E" text-anchor="middle">4.9★</text>
  <text x="500" y="314" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">GOOGLE RATING</text>
  <text x="700" y="296" font-family="sans-serif" font-weight="900" font-size="14" fill="#C89A2E" text-anchor="middle">Narps UK</text>
  <text x="700" y="314" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">REGISTERED MEMBER</text>

  <!-- Services section preview -->
  <rect y="332" width="800" height="168" fill="#FAF5EE"/>
  <text x="400" y="360" font-family="sans-serif" font-weight="900" font-size="16" fill="#2C1A0E" text-anchor="middle">Tailored Care for Every Dog</text>
  <!-- Service cards -->
  <rect x="24" y="374" width="235" height="110" rx="10" fill="#fff" stroke="#E8D9C8" stroke-width="1"/>
  <rect x="32" y="382" width="28" height="28" rx="7" fill="rgba(200,154,46,0.15)"/>
  <text x="46" y="401" font-family="sans-serif" font-size="9" fill="#C89A2E" text-anchor="middle">...</text>
  <text x="120" y="428" font-family="sans-serif" font-weight="800" font-size="11" fill="#2C1A0E" text-anchor="middle">Group Dog Walks</text>
  <text x="120" y="444" font-family="sans-serif" font-size="9" fill="#6B4C3B" text-anchor="middle">Up to four dogs per group</text>

  <rect x="283" y="374" width="234" height="110" rx="10" fill="#fff" stroke="#E8D9C8" stroke-width="1"/>
  <text x="400" y="428" font-family="sans-serif" font-weight="800" font-size="11" fill="#2C1A0E" text-anchor="middle">Doggy Daycare</text>
  <text x="400" y="444" font-family="sans-serif" font-size="9" fill="#6B4C3B" text-anchor="middle">Full days of play and rest</text>

  <rect x="541" y="374" width="235" height="110" rx="10" fill="#fff" stroke="#E8D9C8" stroke-width="1"/>
  <text x="658" y="428" font-family="sans-serif" font-weight="800" font-size="11" fill="#2C1A0E" text-anchor="middle">Home Boarding</text>
  <text x="658" y="444" font-family="sans-serif" font-size="9" fill="#6B4C3B" text-anchor="middle">Overnight family-style care</text>
